name: Build and Release

# 触发条件：推送 v* 格式的 tag（如 v1.1.3）
on:
  push:
    tags:
      - 'v*'

# 全局并发控制：同一 tag 只允许一个构建，避免重复发版
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    # 兜底超时：macOS 构建 + 公证最长 75 分钟（公证 --wait 最多 60min + build/release 约 10min）
    timeout-minutes: 75
    permissions:
      contents: write    # 创建 GitHub Release
      pages: write       # 部署 appcast.xml 到 GitHub Pages
      id-token: write    # GitHub Pages 部署需要 OIDC

    # 统一管理签名身份，避免在各 step 重复硬编码
    env:
      # Developer ID Application 证书的 Team ID
      DEVELOPMENT_TEAM: Z2L7QJW4R7
      # 完整签名身份（codesign / stapler 使用）
      SIGN_ID: "Developer ID Application: Shandong Gaite Network Co., Ltd. (Z2L7QJW4R7)"
      # Sparkle 版本（生成 appcast.xml 用）
      SPARKLE_VERSION: "2.9.4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============ 准备阶段 ============
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download Sparkle tools
        run: |
          curl -L -o sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          tar -xf sparkle.tar.xz
          mkdir -p sparkle-tools
          cp bin/generate_appcast sparkle-tools/

      # ============ 证书导入 ============
      # 创建 CI 临时钥匙串并导入 Developer ID 证书
      # KEYCHAIN_PASSWORD 自动生成，无需手动配置 secret（runner 一次性，安全性足够）
      - name: Setup signing
        env:
          DEVELOPER_ID_APPLICATION_CERTIFICATE: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE }}
          DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
        run: |
          # 生成临时钥匙串密码（无需配置为 secret）
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # 创建 CI 临时钥匙串并导入 Developer ID 证书
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          # 钥匙串解锁后 1200 秒内不自动锁定（覆盖整个构建流程）
          security set-keychain-settings -lut 1200 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$DEVELOPER_ID_APPLICATION_CERTIFICATE" | base64 --decode -o developer_id.p12
          security import developer_id.p12 -k build.keychain -P "$DEVELOPER_ID_APPLICATION_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          # 允许 codesign 无弹窗访问钥匙串私钥
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          # 将临时钥匙串设为首选查询位置
          security list-keychain -d user -s build.keychain login.keychain

      # ============ 构建阶段 ============
      - name: Build KimiCodeBar
        run: |
          xcodebuild \
            -project macOS/KimiCodeBar.xcodeproj \
            -target KimiCodeBar \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            BUILD_DIR="$(pwd)/macOS/build"

      # ============ 代码签名阶段 ============
      # 手动重签 Sparkle 框架的嵌套二进制（Sparkle 官方要求，XPC 服务有特殊 entitlements）
      - name: Sign app
        run: |
          mkdir -p dist
          cp -R macOS/build/Release/KimiCodeBar.app dist/
          APP="dist/KimiCodeBar.app"

          # 1. 重新签名 Sparkle 框架内部所有辅助二进制（保留原有 entitlements）
          codesign --force --timestamp --options runtime --preserve-metadata=entitlements --sign "$SIGN_ID" "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc"
          codesign --force --timestamp --options runtime --preserve-metadata=entitlements --sign "$SIGN_ID" "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc"
          codesign --force --timestamp --options runtime --preserve-metadata=entitlements --sign "$SIGN_ID" "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate"
          codesign --force --timestamp --options runtime --preserve-metadata=entitlements --sign "$SIGN_ID" "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app"

          # 2. 重新签名 Sparkle 框架本身
          codesign --force --timestamp --options runtime --sign "$SIGN_ID" "$APP/Contents/Frameworks/Sparkle.framework/Versions/B"

          # 3. 重新签名主程序，显式指定发布版 entitlements
          codesign --force --timestamp --options runtime --entitlements macOS/KimiCodeBar/KimiCodeBar.entitlements --sign "$SIGN_ID" "$APP/Contents/MacOS/KimiCodeBar"

          # 4. 最终签名整个 app bundle（不使用 --deep，已手动完成嵌套签名）
          codesign --force --timestamp --options runtime --sign "$SIGN_ID" "$APP"

          # 5. 本地校验
          codesign -vvv --deep --strict "$APP"
          spctl -a -t exec -vv "$APP" || true

      # ============ 打包阶段 ============
      - name: Package
        run: |
          cd dist
          VERSION="${GITHUB_REF_NAME#v}"
          # Sparkle 自动更新用 zip（必须在 app 签名完成后打包）
          zip -r "KimiCodeBar-${VERSION}-sparkle-update.zip" KimiCodeBar.app
          # 用户首次安装用 dmg（明确标注 macOS，避免与后续 Windows 版混淆）
          DMG_NAME="KimiCodeBar-${VERSION}-macOS.dmg"
          create-dmg \
            --volname "KimiCodeBar" \
            --background "../macOS/Resources/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 210 \
            --icon "KimiCodeBar.app" 150 210 \
            --no-internet-enable \
            "${DMG_NAME}" \
            "KimiCodeBar.app"

      - name: Sign disk image
        run: |
          codesign --force --timestamp --options runtime --sign "$SIGN_ID" dist/KimiCodeBar-*-macOS.dmg

      # ============ 公证阶段 ============
      # 提交 DMG 到 Apple Notarization 服务并等待结果（notarytool --wait 内部循环轮询，最多 60 分钟）
      - name: Notarize
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          DMG_PATH=$(ls dist/KimiCodeBar-*-macOS.dmg | head -1)

          # 关键：启用 pipefail 让管道返回 notarytool 的真实退出码
          # 否则 | tee 会让 $? 永远是 0（tee 成功），超时后无法正确退出
          set +e
          set -o pipefail

          # 提交并持续等待公证完成（notarytool 内部循环轮询，最多 60 分钟）
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --wait --timeout 3600 2>&1 | tee notary_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set +o pipefail
          set -e

          # submission id 用于 Invalid 时拉取详细日志
          SUBMISSION_ID=$(grep -E '^\s*id:' notary_output.txt | head -1 | awk '{print $2}') || true

          # 公证结果为 Invalid：拉取详细日志后失败退出
          if grep -q "status: Invalid" notary_output.txt; then
            echo "::error::Notarization failed (status: Invalid), fetching detailed log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$NOTARIZATION_APPLE_ID" \
              --team-id "$NOTARIZATION_TEAM_ID" \
              --password "$NOTARIZATION_PASSWORD"
            exit 1
          fi

          # 公证超时或失败：直接退出，不继续 staple
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Notarization did not complete successfully (exit code: $EXIT_CODE)"
            exit $EXIT_CODE
          fi

          # 公证成功：staple 票据到 DMG
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      # ============ 生成 Sparkle 更新清单 ============
      # appcast.xml 是 Sparkle 客户端检查更新的清单文件
      # 必须随每次发版更新，并部署到 GitHub Pages 的固定 URL 供 App 拉取
      - name: Generate Appcast
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="KimiCodeBar-${VERSION}-sparkle-update.zip"
          mkdir -p updates
          cp "dist/${ZIP_NAME}" updates/
          echo "$SPARKLE_PRIVATE_ED_KEY" | ./sparkle-tools/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/xifandev/KimiCodeBar/releases/download/${GITHUB_REF_NAME}/" \
            -o appcast.xml \
            updates/
          mkdir -p docs
          cp appcast.xml docs/appcast.xml

      # ============ 发布阶段 ============
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/KimiCodeBar-*-macOS.dmg
            dist/KimiCodeBar-*-sparkle-update.zip
          body_path: CHANGELOG.md

      # 部署 appcast.xml 到 GitHub Pages（Sparkle 自动更新依赖此 URL）
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ============ 清理阶段（最佳实践）============
      # 无论成功失败都清理临时钥匙串和证书文件
      # GitHub runner 虽是一次性，但显式清理是 CI 签名的最佳实践
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f developer_id.p12
