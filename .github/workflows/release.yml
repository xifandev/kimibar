name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build KimiBar
        run: |
          xcodebuild \
            -project KimiBar.xcodeproj \
            -target KimiBar \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            BUILD_DIR="$(pwd)/build"

      - name: Package
        run: |
          mkdir -p dist
          cp -R build/Release/KimiBar.app dist/
          cd dist
          zip -r "KimiBar-${{ github.ref_name }}.zip" KimiBar.app

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/KimiBar-${{ github.ref_name }}.zip
          generate_release_notes: true
