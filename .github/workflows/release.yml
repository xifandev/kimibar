name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build KimiCodeBar
        run: |
          xcodebuild \
            -project macOS/KimiCodeBar.xcodeproj \
            -target KimiCodeBar \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            BUILD_DIR="$(pwd)/macOS/build"

      - name: Package
        run: |
          mkdir -p dist
          cp -R macOS/build/Release/KimiCodeBar.app dist/
          cd dist
          zip -r "KimiCodeBar-${{ github.ref_name }}.zip" KimiCodeBar.app

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/KimiCodeBar-${{ github.ref_name }}.zip
          generate_release_notes: true
